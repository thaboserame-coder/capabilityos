name: Deploy (Vercel)

# Deploys preview builds for pull requests and the production build on
# merges to `main`. Requires three repository secrets, set under
# Settings > Secrets and variables > Actions (see docs/DEPLOYMENT_CHECKLIST.md):
#   VERCEL_TOKEN   - personal/team access token from vercel.com/account/tokens
#   VERCEL_ORG_ID  - from `vercel project ls` or the Vercel project settings
#   VERCEL_PROJECT_ID - from the Vercel project settings
#
# This workflow only runs deploy steps once those secrets are present, so it
# is safe to merge before the Vercel project has been created — the job will
# simply report that it was skipped.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets are configured
        id: secrets
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel secrets are not configured — skipping deploy. See docs/DEPLOYMENT_CHECKLIST.md."
          fi

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install Vercel CLI
        if: steps.secrets.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.secrets.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build with Vercel
        if: steps.secrets.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy to Vercel
        if: steps.secrets.outputs.configured == 'true'
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.secrets.outputs.configured == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployment: ${{ steps.deploy.outputs.url }}`,
            });
